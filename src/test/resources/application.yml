spring:
  datasource:
    driver-class-name: org.h2.Driver
    username: sa
    url: jdbc:h2:mem:testdb
  sql:
    init:
      mode: never
  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    hibernate:
      ddl-auto: create

  mail:
    host: MockHost
    username: MockUsername

jwt:
  secret: SECRET_KEY

slack:
  webhook:
    uri: https://mock-slack-webhook

cloud:
  aws:
    credentials:
      accessKey: accessKey
      secretKey: secretKey
    region:
      static: ap-northeast-2
    s3:
      bucket: bucket

payment:
  toss:
    secret-key: tossSecretKey
    confirm-url: tossConfirmUrl
