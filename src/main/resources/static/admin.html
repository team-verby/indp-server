<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>in/DP Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e2e8f0; height: 100vh; display: flex; overflow: hidden; }

    /* ── Login ── */
    #login-screen { position: fixed; inset: 0; background: #0a0a0a; display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { background: #141414; border: 1px solid #1e293b; border-radius: 12px; padding: 40px; width: 360px; }
    .login-logo { font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 6px; }
    .login-logo span { opacity: .4; }
    .login-sub { font-size: 12px; color: #475569; margin-bottom: 28px; }
    .login-field { margin-bottom: 14px; }
    .login-field label { display: block; font-size: 11px; color: #64748b; margin-bottom: 5px; letter-spacing: .05em; }
    .login-field input { width: 100%; background: #0a0a0a; border: 1px solid #1e293b; border-radius: 6px; padding: 10px 12px; color: #e2e8f0; font-size: 13px; outline: none; }
    .login-field input:focus { border-color: #334155; }
    .login-btn { width: 100%; background: #e2e8f0; color: #0a0a0a; border: none; border-radius: 6px; padding: 11px; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 8px; }
    .login-btn:hover { background: #fff; }
    .login-err { font-size: 12px; color: #f87171; margin-top: 10px; text-align: center; }

    /* ── Sidebar ── */
    #sidebar { width: 200px; background: #0d0d0d; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; flex-shrink: 0; }
    .sb-logo { padding: 20px 18px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #1a1a1a; }
    .sb-logo-text { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.03em; }
    .sb-logo-text span { opacity: .3; }
    .admin-badge { font-size: 9px; font-weight: 700; letter-spacing: .08em; background: #1e293b; color: #94a3b8; border-radius: 4px; padding: 2px 6px; }
    .sb-section { padding: 16px 12px 6px; font-size: 10px; color: #334155; letter-spacing: .1em; font-weight: 600; }
    .sb-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 6px; margin: 1px 6px; cursor: pointer; font-size: 13px; color: #64748b; transition: all .15s; }
    .sb-item:hover { background: #141414; color: #94a3b8; }
    .sb-item.active { background: #141414; color: #e2e8f0; }
    .sb-item svg { flex-shrink: 0; }
    .sb-bottom { margin-top: auto; padding: 14px; border-top: 1px solid #1a1a1a; display: flex; align-items: center; gap: 10px; }
    .sb-avatar { width: 28px; height: 28px; border-radius: 50%; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; color: #94a3b8; flex-shrink: 0; }
    .sb-user-name { font-size: 12px; font-weight: 600; color: #e2e8f0; }
    .sb-user-role { font-size: 10px; color: #475569; }
    .sb-logout { margin-left: auto; cursor: pointer; color: #334155; }
    .sb-logout:hover { color: #64748b; }

    /* ── Main ── */
    #main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .top-bar { padding: 16px 28px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .top-title { font-size: 14px; font-weight: 600; color: #94a3b8; }
    .top-date { font-size: 12px; color: #334155; }
    .content-area { flex: 1; overflow-y: auto; padding: 28px; }

    /* ── Page Header ── */
    .page-title { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: #475569; margin-bottom: 24px; }
    .page-sub strong { color: #94a3b8; }

    /* ── Search / Filter bar ── */
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; }
    .search-box { flex: 1; background: #141414; border: 1px solid #1e293b; border-radius: 6px; padding: 9px 14px; color: #e2e8f0; font-size: 13px; outline: none; }
    .search-box:focus { border-color: #334155; }
    .search-box::placeholder { color: #334155; }
    .filter-select { background: #141414; border: 1px solid #1e293b; border-radius: 6px; padding: 9px 12px; color: #94a3b8; font-size: 12px; outline: none; cursor: pointer; }

    /* ── Store Table ── */
    .store-table { width: 100%; border-collapse: collapse; }
    .store-table th { text-align: left; font-size: 11px; font-weight: 600; color: #334155; letter-spacing: .05em; padding: 10px 12px; border-bottom: 1px solid #1a1a1a; }
    .store-table td { padding: 12px; border-bottom: 1px solid #111; vertical-align: middle; }
    .store-table tr:hover td { background: #111; }
    .store-info { display: flex; align-items: center; gap: 12px; }
    .store-thumb { width: 40px; height: 40px; border-radius: 6px; background: #1e293b; flex-shrink: 0; object-fit: cover; display: flex; align-items: center; justify-content: center; font-size: 16px; overflow: hidden; }
    .store-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .store-addr { font-size: 11px; color: #475569; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .plan-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; background: #1e293b; color: #94a3b8; }
    .plan-badge.premium { background: #1a1a2e; color: #818cf8; }
    .playing-cell { display: flex; align-items: center; gap: 7px; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .dot-on { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot-off { background: #334155; }
    .song-title { font-size: 12px; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
    .song-artist { font-size: 11px; color: #475569; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; }
    .status-active { background: #0d2010; color: #22c55e; }
    .status-expired { background: #1a1a1a; color: #475569; }
    .status-pending { background: #1a1108; color: #f59e0b; }
    .detail-btn { font-size: 11px; color: #475569; background: #141414; border: 1px solid #1e293b; border-radius: 4px; padding: 5px 10px; cursor: pointer; white-space: nowrap; }
    .detail-btn:hover { color: #94a3b8; border-color: #334155; }

    /* ── Right Panel ── */
    #panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; display: none; }
    #panel-overlay.open { display: block; }
    #right-panel { position: fixed; top: 0; right: -520px; width: 520px; height: 100vh; background: #0f0f0f; border-left: 1px solid #1e293b; z-index: 101; transition: right .3s ease; display: flex; flex-direction: column; overflow: hidden; }
    #right-panel.open { right: 0; }
    .panel-header { padding: 20px 22px 16px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: flex-start; justify-content: space-between; flex-shrink: 0; }
    .panel-store-name { font-size: 16px; font-weight: 700; color: #fff; }
    .panel-store-addr { font-size: 12px; color: #475569; margin-top: 3px; }
    .panel-close { background: none; border: none; color: #475569; cursor: pointer; font-size: 18px; line-height: 1; padding: 2px; }
    .panel-close:hover { color: #94a3b8; }
    .panel-tabs { display: flex; padding: 0 22px; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; }
    .panel-tab { padding: 12px 16px; font-size: 13px; color: #475569; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: all .15s; }
    .panel-tab.active { color: #e2e8f0; border-bottom-color: #e2e8f0; }
    .panel-tab:hover:not(.active) { color: #94a3b8; }
    .panel-body { flex: 1; overflow-y: auto; padding: 20px 22px; }
    .panel-footer { padding: 14px 22px; border-top: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .panel-status-label { font-size: 11px; color: #334155; }

    /* ── Info Sections ── */
    .info-section { margin-bottom: 22px; }
    .info-section-title { font-size: 11px; font-weight: 600; color: #334155; letter-spacing: .08em; margin-bottom: 12px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-item label { display: block; font-size: 10px; color: #475569; margin-bottom: 3px; }
    .info-item span { font-size: 13px; color: #e2e8f0; }
    .info-item.full { grid-column: 1 / -1; }
    .info-item .val-em { font-size: 15px; font-weight: 700; color: #fff; }

    /* ── Photos ── */
    .photo-strip { display: flex; gap: 8px; flex-wrap: nowrap; overflow-x: auto; padding-bottom: 4px; }
    .photo-strip img { width: 100px; height: 70px; object-fit: cover; border-radius: 6px; flex-shrink: 0; border: 1px solid #1e293b; }
    .photo-placeholder { width: 100px; height: 70px; background: #1a1a1a; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #334155; font-size: 20px; flex-shrink: 0; }

    /* ── Mood Table ── */
    .mood-table { width: 100%; border-collapse: collapse; }
    .mood-table td { padding: 8px 0; border-bottom: 1px solid #111; font-size: 13px; }
    .mood-table .time-cell { color: #94a3b8; width: 120px; font-variant-numeric: tabular-nums; }
    .mood-select { background: #141414; border: 1px solid #1e293b; border-radius: 5px; padding: 6px 10px; color: #94a3b8; font-size: 12px; outline: none; width: 160px; }
    .mood-del { background: none; border: none; color: #334155; cursor: pointer; padding: 4px 6px; border-radius: 4px; }
    .mood-del:hover { color: #f87171; background: #1a0808; }
    .add-time-btn { display: flex; align-items: center; gap: 6px; background: none; border: 1px solid #1e293b; border-radius: 6px; padding: 7px 14px; color: #64748b; font-size: 12px; cursor: pointer; margin-top: 12px; }
    .add-time-btn:hover { border-color: #334155; color: #94a3b8; }

    /* ── Genre Chips ── */
    .genre-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .genre-chip { padding: 6px 14px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid #1e293b; color: #64748b; background: #141414; transition: all .15s; }
    .genre-chip:hover { border-color: #334155; color: #94a3b8; }
    .genre-chip.blocked { background: #1a0808; border-color: #7f1d1d; color: #f87171; }
    .genre-hint { font-size: 11px; color: #475569; margin-bottom: 16px; }
    .genre-hint strong { color: #94a3b8; }

    /* ── Recommendation List ── */
    .rec-section-title { font-size: 11px; font-weight: 600; color: #334155; letter-spacing: .08em; margin-bottom: 10px; margin-top: 18px; }
    .rec-today-count { font-size: 12px; color: #f59e0b; font-weight: 600; margin-bottom: 10px; }
    .rec-item { display: flex; align-items: flex-start; gap: 10px; padding: 11px 12px; background: #141414; border: 1px solid #1a1a1a; border-radius: 7px; margin-bottom: 8px; }
    .rec-dot { width: 7px; height: 7px; border-radius: 50%; background: #22c55e; margin-top: 4px; flex-shrink: 0; }
    .rec-title { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .rec-artist { font-size: 11px; color: #64748b; margin-top: 2px; }
    .rec-meta { margin-left: auto; text-align: right; }
    .rec-referee { font-size: 12px; color: #94a3b8; }
    .rec-date { font-size: 10px; color: #334155; margin-top: 2px; }
    .rec-genre-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 3px; background: #0d1a2e; color: #60a5fa; margin-top: 4px; }

    /* ── Manual Rec Form ── */
    .rec-add-form { background: #0a0a0a; border: 1px solid #1e293b; border-radius: 8px; padding: 14px; margin-top: 16px; }
    .rec-add-title { font-size: 11px; font-weight: 600; color: #334155; letter-spacing: .08em; margin-bottom: 12px; }
    .rec-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .rec-form-item label { display: block; font-size: 10px; color: #475569; margin-bottom: 4px; }
    .rec-form-item input { width: 100%; background: #141414; border: 1px solid #1e293b; border-radius: 5px; padding: 7px 10px; color: #e2e8f0; font-size: 12px; outline: none; }
    .rec-form-item input:focus { border-color: #334155; }
    .rec-form-item.full { grid-column: 1 / -1; }
    .rec-submit-btn { margin-top: 10px; width: 100%; background: #1e293b; border: none; border-radius: 5px; padding: 8px; color: #94a3b8; font-size: 12px; cursor: pointer; }
    .rec-submit-btn:hover { background: #334155; color: #e2e8f0; }

    /* ── Playlist Page ── */
    .pl-layout { display: grid; grid-template-columns: 340px 1fr; gap: 20px; height: calc(100vh - 160px); }
    .pl-left { display: flex; flex-direction: column; gap: 14px; overflow: hidden; }
    .pl-upload { border: 1.5px dashed #1e293b; border-radius: 10px; padding: 24px 20px; text-align: center; cursor: pointer; transition: border-color .15s; background: #0d0d0d; }
    .pl-upload:hover { border-color: #334155; }
    .pl-upload-icon { font-size: 28px; color: #334155; margin-bottom: 8px; }
    .pl-upload-text { font-size: 13px; color: #64748b; }
    .pl-upload-text strong { color: #94a3b8; }
    .pl-upload-hint { font-size: 10px; color: #334155; margin-top: 6px; }
    .pl-store-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
    .pl-store-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; transition: all .15s; }
    .pl-store-item:hover { background: #141414; }
    .pl-store-item.selected { background: #141414; border-color: #1e293b; }
    .pl-store-thumb { width: 36px; height: 36px; border-radius: 6px; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .pl-store-name { font-size: 13px; font-weight: 600; color: #e2e8f0; }
    .pl-store-addr { font-size: 11px; color: #475569; }
    .no-pl-badge { font-size: 10px; color: #475569; background: #141414; border: 1px solid #1e293b; border-radius: 3px; padding: 2px 6px; margin-left: auto; flex-shrink: 0; }
    .pl-right { background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    .pl-right-header { padding: 18px 20px; border-bottom: 1px solid #1a1a1a; display: flex; align-items: center; gap: 12px; }
    .pl-right-name { font-size: 15px; font-weight: 700; color: #fff; }
    .pl-right-sub { font-size: 11px; color: #475569; }
    .pl-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #334155; gap: 10px; }
    .pl-empty-icon { font-size: 36px; }
    .pl-empty-text { font-size: 13px; }
    .pl-songs { flex: 1; overflow-y: auto; }
    .pl-song-row { display: flex; align-items: center; gap: 12px; padding: 10px 20px; border-bottom: 1px solid #111; }
    .pl-song-num { font-size: 12px; color: #334155; width: 24px; }
    .pl-song-info { flex: 1; }
    .pl-song-title { font-size: 13px; color: #e2e8f0; }
    .pl-song-artist { font-size: 11px; color: #475569; margin-top: 1px; }
    .pl-song-time { font-size: 11px; color: #334155; }
    .pl-song-vid { font-size: 10px; color: #3b82f6; font-family: monospace; text-decoration: none; }
    .pl-song-vid:hover { color: #60a5fa; }

    /* ── Loading/Empty ── */
    .loading { text-align: center; padding: 40px; color: #334155; font-size: 13px; }
    .empty-state { text-align: center; padding: 40px; color: #334155; font-size: 13px; }

    /* ── Divider ── */
    .divider { height: 1px; background: #1a1a1a; margin: 16px 0; }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
  </style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">in<span>/</span>DP</div>
    <div class="login-sub">관리자 로그인</div>
    <div class="login-field"><label>아이디</label><input id="l-id" type="text" value="admin"
                                                      placeholder="admin"></div>
    <div class="login-field"><label>비밀번호</label><input id="l-pw" type="password" value="admin"
                                                       placeholder="••••••"></div>
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div id="login-err" class="login-err"></div>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-text">in<span>/</span>DP</div>
    <div class="admin-badge">ADMIN</div>
  </div>
  <div class="sb-section">메뉴</div>
  <div class="sb-item active" onclick="showPage('stores')" id="nav-stores">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2">
      <rect x="3" y="3" width="7" height="7"/>
      <rect x="14" y="3" width="7" height="7"/>
      <rect x="3" y="14" width="7" height="7"/>
      <rect x="14" y="14" width="7" height="7"/>
    </svg>
    매장 관리
  </div>
  <div class="sb-item" onclick="showPage('playlist')" id="nav-playlist">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="2">
      <line x1="8" y1="6" x2="21" y2="6"/>
      <line x1="8" y1="12" x2="21" y2="12"/>
      <line x1="8" y1="18" x2="21" y2="18"/>
      <line x1="3" y1="6" x2="3.01" y2="6"/>
      <line x1="3" y1="12" x2="3.01" y2="12"/>
      <line x1="3" y1="18" x2="3.01" y2="18"/>
    </svg>
    플레이리스트 관리
  </div>
  <div class="sb-bottom">
    <div class="sb-avatar">A</div>
    <div>
      <div class="sb-user-name">관리자</div>
      <div class="sb-user-role">Super Admin</div>
    </div>
    <div class="sb-logout" onclick="logout()" title="로그아웃">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </div>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div class="top-bar">
    <div class="top-title" id="top-title">매장 관리</div>
    <div class="top-date" id="top-date"></div>
  </div>
  <div class="content-area">

    <!-- 매장 관리 -->
    <div id="page-stores">
      <div class="page-title">매장 관리</div>
      <div class="page-sub" id="stores-sub">로딩 중...</div>
      <div class="toolbar">
        <input class="search-box" id="store-search" placeholder="매장명, 신청자, 연락처 검색..."
               oninput="filterStores()">
        <select class="filter-select" id="store-filter" onchange="filterStores()">
          <option value="">전체 상태</option>
          <option value="ACTIVE">이용 중</option>
          <option value="EXPIRED">완료</option>
          <option value="PENDING_PAYMENT">결제 대기</option>
        </select>
      </div>
      <div id="stores-loading" class="loading">로딩 중...</div>
      <table class="store-table" id="stores-table" style="display:none">
        <thead>
        <tr>
          <th>매장 정보</th>
          <th>신청자</th>
          <th>연락처</th>
          <th>요금제</th>
          <th>지금 재생 중</th>
          <th>신청일</th>
          <th>상태</th>
          <th></th>
        </tr>
        </thead>
        <tbody id="stores-tbody"></tbody>
      </table>
    </div>

    <!-- 플레이리스트 관리 -->
    <div id="page-playlist" style="display:none">
      <div class="page-title">플레이리스트 관리</div>
      <div class="page-sub">엑셀 파일을 업로드하여 매장별 플레이리스트를 생성합니다</div>
      <div class="pl-layout">
        <div class="pl-left">
          <div class="pl-upload" onclick="document.getElementById('excel-input').click()"
               id="pl-drop-zone">
            <div class="pl-upload-icon">⬆</div>
            <div class="pl-upload-text"><strong>클릭</strong>하거나 파일을 여기로 끌어다 놓으세요</div>
            <div class="pl-upload-hint">xlsx, xls 파일 지원 · 시트명 = 매장명</div>
            <input type="file" id="excel-input" accept=".xlsx,.xls" style="display:none"
                   onchange="handleExcelUpload(this)">
          </div>
          <div class="pl-store-list" id="pl-store-list"></div>
        </div>
        <div class="pl-right" id="pl-right">
          <div class="pl-empty">
            <div class="pl-empty-icon">🎵</div>
            <div class="pl-empty-text">매장을 선택하면 플레이리스트가 표시됩니다</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Panel Overlay -->
<div id="panel-overlay" onclick="closePanel()"></div>

<!-- Right Panel -->
<div id="right-panel">
  <div class="panel-header">
    <div>
      <div class="panel-store-name" id="panel-store-name">—</div>
      <div class="panel-store-addr" id="panel-store-addr">—</div>
    </div>
    <button class="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-tabs">
    <div class="panel-tab active" onclick="switchTab('info')" id="tab-info">기본 정보</div>
    <div class="panel-tab" onclick="switchTab('mood')" id="tab-mood">매장 무드</div>
    <div class="panel-tab" onclick="switchTab('rec')" id="tab-rec">추천곡 관리</div>
  </div>
  <div class="panel-body" id="panel-body">
    <div class="loading">로딩 중...</div>
  </div>
  <div class="panel-footer">
    <div class="panel-status-label">현재 상태</div>
    <div id="panel-status"></div>
  </div>
</div>

<script>
  const API = 'http://localhost:8080';
  let token = localStorage.getItem('admin_token');
  let allStores = [];
  let currentStoreId = null;
  let currentStoreDetail = null;
  let panelTab = 'info';

  // ── Auth ──
  async function doLogin() {
    const id = document.getElementById('l-id').value;
    const pw = document.getElementById('l-pw').value;
    const r = await fetch(`${API}/api/admin/login`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({loginId: id, password: pw})
    });
    if (r.ok) {
      const d = await r.json();
      token = d.accessToken || d.token;
      localStorage.setItem('admin_token', token);
      document.getElementById('login-screen').style.display = 'none';
      init();
    } else {
      document.getElementById('login-err').textContent = '아이디 또는 비밀번호가 올바르지 않습니다.';
    }
  }

  function logout() {
    localStorage.removeItem('admin_token');
    token = null;
    location.reload();
  }

  async function api(method, path, body) {
    const opts = { method, headers: {'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json'} };
    if (body) opts.body = JSON.stringify(body);
    const r = await fetch(API + path, opts);
    if (r.status === 401) { logout(); return null; }
    const text = await r.text();
    return text ? JSON.parse(text) : null;
  }

  // ── Init ──
  function init() {
    updateDate();
    if (token) {
      document.getElementById('login-screen').style.display = 'none';
      loadStores();
      loadPlaylistStores();
    }
  }

  function updateDate() {
    const d = new Date();
    document.getElementById('top-date').textContent =
      `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${['일','월','화','수','목','금','토'][d.getDay()]}`;
  }

  // ── Navigation ──
  function showPage(page) {
    document.getElementById('page-stores').style.display = page === 'stores' ? '' : 'none';
    document.getElementById('page-playlist').style.display = page === 'playlist' ? '' : 'none';
    document.getElementById('nav-stores').className = 'sb-item' + (page === 'stores' ? ' active' : '');
    document.getElementById('nav-playlist').className = 'sb-item' + (page === 'playlist' ? ' active' : '');
    document.getElementById('top-title').textContent = page === 'stores' ? '매장 관리' : '플레이리스트 관리';
    closePanel();
  }

  // ── Store List ──
  async function loadStores() {
    const data = await api('GET', '/api/admin/stores?size=100');
    if (!data) return;
    allStores = data.stores || [];
    document.getElementById('stores-sub').innerHTML = `총 <strong>${allStores.length}</strong>건의 도입 문의가 접수되었습니다`;
    renderStores(allStores);
  }

  function filterStores() {
    const q = document.getElementById('store-search').value.toLowerCase();
    const status = document.getElementById('store-filter').value;
    const filtered = allStores.filter(s => {
      const matchQ = !q || s.name?.toLowerCase().includes(q);
      const matchStatus = !status || s.subscription?.status === status;
      return matchQ && matchStatus;
    });
    renderStores(filtered);
  }

  function renderStores(stores) {
    document.getElementById('stores-loading').style.display = 'none';
    const table = document.getElementById('stores-table');
    table.style.display = '';
    const tbody = document.getElementById('stores-tbody');
    if (!stores.length) { tbody.innerHTML = '<tr><td colspan="8" class="empty-state">매장이 없습니다</td></tr>'; return; }

    tbody.innerHTML = stores.map(s => {
      const sub = s.subscription || {};
      const song = s.currentSong;
      const statusLabel = { ACTIVE:'이용 중', EXPIRED:'완료', PENDING_PAYMENT:'결제 대기', CANCELLED:'취소', SUSPENDED:'정지' }[sub.status] || sub.status || '-';
      const statusClass = { ACTIVE:'status-active', EXPIRED:'status-expired', PENDING_PAYMENT:'status-pending' }[sub.status] || 'status-expired';
      const planLabel = sub.plan === 'PLAN_A' ? '기본' : sub.plan === 'PLAN_B' ? '프리미엄' : sub.plan || '-';
      const planClass = sub.plan === 'PLAN_B' ? 'premium' : '';
      const startDate = sub.startDate || '-';

      const songCell = song
        ? `<div class="playing-cell"><div class="dot dot-on"></div><div><div class="song-title">${esc(song.title)}</div><div class="song-artist">${esc(song.artist)}</div></div></div>`
        : `<div class="playing-cell"><div class="dot dot-off"></div><span style="color:#334155;font-size:12px">재생 없음</span></div>`;

      return `<tr>
        <td><div class="store-info">
          <div class="store-thumb">🏪</div>
          <div><div class="store-name">${esc(s.name)}</div><div class="store-addr">${s.storeId ? `ID: ${s.storeId}` : ''}</div></div>
        </div></td>
        <td style="font-size:13px;color:#94a3b8">${s.applicantName || '-'}</td>
        <td style="font-size:12px;color:#64748b">${s.applicantPhone || '-'}</td>
        <td><span class="plan-badge ${planClass}">${planLabel}</span></td>
        <td>${songCell}</td>
        <td style="font-size:12px;color:#64748b">${startDate}</td>
        <td><span class="status-badge ${statusClass}">${statusLabel}</span></td>
        <td><button class="detail-btn" onclick="openPanel(${s.storeId})">상세</button></td>
      </tr>`;
    }).join('');
  }

  // ── Right Panel ──
  async function openPanel(storeId) {
    currentStoreId = storeId;
    panelTab = 'info';
    document.getElementById('panel-overlay').classList.add('open');
    document.getElementById('right-panel').classList.add('open');
    document.getElementById('panel-body').innerHTML = '<div class="loading">로딩 중...</div>';
    switchTab('info', false);

    const data = await api('GET', `/api/admin/stores/${storeId}`);
    if (!data) return;
    currentStoreDetail = data;

    const si = data.storeInfo || {};
    document.getElementById('panel-store-name').textContent = si.name || '-';
    document.getElementById('panel-store-addr').textContent = si.address || '-';
    renderPanelStatus(data.subscriptionInfo);
    renderInfoTab(data);
  }

  function closePanel() {
    document.getElementById('panel-overlay').classList.remove('open');
    document.getElementById('right-panel').classList.remove('open');
    currentStoreId = null;
    currentStoreDetail = null;
  }

  function switchTab(tab, render = true) {
    panelTab = tab;
    ['info','mood','rec'].forEach(t => {
      document.getElementById(`tab-${t}`).className = 'panel-tab' + (t === tab ? ' active' : '');
    });
    if (!render) return;
    if (!currentStoreDetail) return;
    if (tab === 'info') renderInfoTab(currentStoreDetail);
    else if (tab === 'mood') renderMoodTab(currentStoreDetail);
    else if (tab === 'rec') renderRecTab();
  }

  function renderPanelStatus(sub) {
    if (!sub) { document.getElementById('panel-status').innerHTML = ''; return; }
    const label = { ACTIVE:'이용 중', EXPIRED:'완료', PENDING_PAYMENT:'결제 대기' }[sub.status] || sub.status;
    const cls = { ACTIVE:'status-active', EXPIRED:'status-expired', PENDING_PAYMENT:'status-pending' }[sub.status] || 'status-expired';
    document.getElementById('panel-status').innerHTML = `<span class="status-badge ${cls}">${label}</span>`;
  }

  function renderInfoTab(data) {
    const ai = data.applyInfo || {};
    const si = data.storeInfo || {};
    const mi = data.musicInfo || {};
    const subi = data.subscriptionInfo || {};

    const days = ['','월','화','수','목','금','토','일'];
    const hours = (si.businessHours || [])
      .filter(h => !h.isClosed)
      .map(h => `${days[h.dayOfWeek]} ${h.openTime}~${h.closeTime}`)
      .join(', ') || '-';

    const photos = (si.photoUrls || []).map(url =>
      `<img src="${esc(url)}" onerror="this.style.display='none'" alt="">`
    ).join('') || '<div class="photo-placeholder">📷</div>';

    const tempoMap = { SLOW:'느림', CALM:'잔잔함', NORMAL:'보통', LIVELY:'활기참', UPBEAT:'빠름' };
    const genreMap = { BALLAD:'발라드', HIPHOP:'힙합', INDIE:'인디', ROCK:'락', DANCE:'댄스', CLASSIC:'클래식', CHILDREN:'동요' };
    const methodMap = { BLUETOOTH:'블루투스 스피커', WIRED:'유선', OTHER:'기타' };
    const playlistTypeMap = { MUSIC_RECOMMENDED:'AI 추천', TIME_BASED:'시간대별', CONSISTENT_MOOD:'일관된 분위기' };

    const planLabel = subi.planType === 'PLAN_A' ? '기본' : subi.planType === 'PLAN_B' ? '프리미엄' : subi.planType || '-';

    document.getElementById('panel-body').innerHTML = `
      <div class="info-section">
        <div class="info-section-title">신청 정보</div>
        <div class="info-grid">
          <div class="info-item"><label>신청자</label><span>${esc(ai.applicantName||'-')}</span></div>
          <div class="info-item"><label>연락처</label><span>${esc(ai.applicantPhone||'-')}</span></div>
          <div class="info-item"><label>요금제</label><span>${planLabel}</span></div>
          <div class="info-item"><label>구독 기간</label><span>${subi.startDate||'-'} ~ ${subi.endTime||'-'}</span></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="info-section">
        <div class="info-section-title">매장 사진</div>
        <div class="photo-strip">${photos}</div>
      </div>
      <div class="divider"></div>
      <div class="info-section">
        <div class="info-section-title">매장 정보</div>
        <div class="info-grid">
          <div class="info-item"><label>매장 이름</label><span>${esc(si.name||'-')}</span></div>
          <div class="info-item"><label>업종</label><span>${esc(si.industry||'-')}</span></div>
          <div class="info-item full"><label>영업 시간</label><span>${hours}</span></div>
          <div class="info-item"><label>고객 연령대</label><span>${esc(si.customerAgeGroup||'-')}</span></div>
          <div class="info-item"><label>조명</label><span>${si.lighting ?? '-'}</span></div>
          <div class="info-item full"><label>분위기</label><span>${(si.vibes||[]).join(', ') || '-'}</span></div>
          <div class="info-item full"><label>주소</label><span>${esc(si.address||'-')}</span></div>
        </div>
      </div>
      <div class="divider"></div>
      <div class="info-section">
        <div class="info-section-title">음악 재생 정보</div>
        <div class="info-grid">
          <div class="info-item"><label>플랫폼</label><span>${esc(mi.MusicPlatform||'-')}</span></div>
          <div class="info-item"><label>재생 방식</label><span>${(mi.playMethods||[]).map(m=>methodMap[m]||m).join(', ')||'-'}</span></div>
          <div class="info-item"><label>플레이리스트 유형</label><span>${playlistTypeMap[mi.playlistType]||mi.playlistType||'-'}</span></div>
          <div class="info-item"><label>전반적인 템포</label><span>${tempoMap[mi.musicTempo]||mi.musicTempo||'-'}</span></div>
          <div class="info-item full"><label>매장 분위기</label><span>${esc(mi.musicMood||'-')}</span></div>
          <div class="info-item full"><label>기본 재생 음악</label><span>${esc(mi.playedMusic||'-')}</span></div>
          <div class="info-item full"><label>차단 장르</label><span>${(mi.rejectedGenres||[]).map(g=>genreMap[g]||g).join(', ')||'없음'}</span></div>
        </div>
      </div>
    `;
  }

  function renderMoodTab(data) {
    const mi = data.musicInfo || {};
    const prefs = mi.timePreferences || [];
    const moodOptions = ['편안한', '활기찬', '잔잔한', '로맨틱', '집중적', '밝은', '차분한', '신나는'].map(m => `<option>${m}</option>`).join('');

    let rows = prefs.map((p, i) => `
      <tr id="mood-row-${i}">
        <td class="time-cell">${p.startTimeHour}:00 — ${p.endTimeHour}:00</td>
        <td><select class="mood-select" id="mood-val-${i}">
          <option value="">${p.mood ? p.mood : '선택 안 함'}</option>
          ${moodOptions}
        </select></td>
        <td><button class="mood-del" onclick="document.getElementById('mood-row-${i}').remove()">🗑</button></td>
      </tr>`).join('');

    if (!rows) rows = `<tr><td colspan="3" style="color:#334155;font-size:12px;padding:16px 0;text-align:center">시간대별 무드 설정이 없습니다</td></tr>`;

    document.getElementById('panel-body').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="info-section-title" style="margin:0">문영 시간대별 무드 설정</div>
        <button class="add-time-btn" onclick="addMoodRow()">+ 구간 추가</button>
      </div>
      <table class="mood-table" id="mood-table"><tbody id="mood-tbody">${rows}</tbody></table>
    `;
  }

  let moodRowCount = 100;
  function addMoodRow() {
    const i = moodRowCount++;
    const moodOptions = ['편안한','활기찬','잔잔한','로맨틱','집중적','밝은','차분한','신나는'].map(m=>`<option>${m}</option>`).join('');
    const row = document.createElement('tr');
    row.id = `mood-row-${i}`;
    row.innerHTML = `
      <td class="time-cell"><input type="number" min="0" max="23" placeholder="시작" style="width:38px;background:#0a0a0a;border:1px solid #1e293b;border-radius:4px;padding:4px;color:#94a3b8;font-size:12px;text-align:center">:00 — <input type="number" min="1" max="24" placeholder="종료" style="width:38px;background:#0a0a0a;border:1px solid #1e293b;border-radius:4px;padding:4px;color:#94a3b8;font-size:12px;text-align:center">:00</td>
      <td><select class="mood-select"><option value="">선택 안 함</option>${moodOptions}</select></td>
      <td><button class="mood-del" onclick="this.closest('tr').remove()">🗑</button></td>`;
    document.getElementById('mood-tbody').appendChild(row);
  }

  async function renderRecTab() {
    const genreMap = { BALLAD:'발라드', HIPHOP:'힙합', INDIE:'인디', ROCK:'락', DANCE:'댄스', CLASSIC:'클래식', CHILDREN:'동요' };
    const allGenres = Object.keys(genreMap);

    const mi = (currentStoreDetail || {}).musicInfo || {};
    const blocked = new Set(mi.rejectedGenres || []);

    const chips = allGenres.map(g => `
      <div class="genre-chip ${blocked.has(g)?'blocked':''}" id="chip-${g}" onclick="toggleGenre('${g}')">${blocked.has(g)?'✕ ':''}${genreMap[g]}</div>
    `).join('');

    document.getElementById('panel-body').innerHTML = `
      <div class="info-section-title">차단 장르 관리</div>
      <div class="genre-chips" id="genre-chips">${chips}</div>
      <div class="genre-hint" id="genre-hint">선택한 장르는 추천에서 제외됩니다 · 현재 <strong>${blocked.size}개</strong> 차단 중</div>
      <div class="divider"></div>
      <div class="rec-section-title">추천곡 목록</div>
      <div id="rec-list-area"><div class="loading">로딩 중...</div></div>
      <div class="rec-add-form">
        <div class="rec-add-title">수동 추천 등록</div>
        <div class="rec-form-grid">
          <div class="rec-form-item"><label>곡 제목</label><input id="rec-title" placeholder="Gravity"></div>
          <div class="rec-form-item"><label>아티스트</label><input id="rec-artist" placeholder="John Mayer"></div>
          <div class="rec-form-item"><label>YouTube Video ID</label><input id="rec-vid" placeholder="abc123XYZ" style="font-family:monospace"></div>
          <div class="rec-form-item"><label>재생 시간 (초)</label><input id="rec-playtime" type="number" placeholder="214"></div>
          <div class="rec-form-item full"><label>추천인 이름</label><input id="rec-referee" placeholder="김지현"></div>
        </div>
        <button class="rec-submit-btn" onclick="submitManualRec()">추천 등록</button>
      </div>
    `;

    const recs = await api('GET', `/api/admin/stores/${currentStoreId}/songs/recommendations`);
    renderRecList(recs);
  }

  function toggleGenre(g) {
    const chip = document.getElementById(`chip-${g}`);
    const genreMap = { BALLAD:'발라드', HIPHOP:'힙합', INDIE:'인디', ROCK:'락', DANCE:'댄스', CLASSIC:'클래식', CHILDREN:'동요' };
    const isBlocked = chip.classList.toggle('blocked');
    chip.textContent = (isBlocked ? '✕ ' : '') + genreMap[g];
    const chips = document.querySelectorAll('.genre-chip.blocked').length;
    document.getElementById('genre-hint').innerHTML =
      `선택한 장르는 추천에서 제외됩니다 · 현재 <strong>${chips}개</strong> 차단 중`;
  }

  function renderRecList(data) {
    const area = document.getElementById('rec-list-area');
    if (!area) return;
    const items = data?.recommendations || data?.songs || [];
    if (!items.length) { area.innerHTML = '<div class="empty-state">추천곡이 없습니다</div>'; return; }

    const today = new Date().toISOString().slice(0,10);
    const todayItems = items.filter(r => (r.createdAt||'').startsWith(today));
    area.innerHTML = `
      <div class="rec-today-count">오늘 추천 · ${todayItems.length}곡</div>
      ${items.map(r => `
        <div class="rec-item">
          <div class="rec-dot"></div>
          <div>
            <div class="rec-title">${esc(r.title||'-')}</div>
            <div class="rec-artist">${esc(r.artist||'-')}</div>
            ${r.genre ? `<div class="rec-genre-badge">${esc(r.genre)}</div>` : ''}
            ${r.vid ? `<div style="margin-top:4px"><a href="https://youtu.be/${esc(r.vid)}" target="_blank" style="font-size:10px;color:#3b82f6;font-family:monospace">▶ ${esc(r.vid)}</a></div>` : ''}
          </div>
          <div class="rec-meta">
            <div class="rec-referee">${esc(r.refereeName||'-')}</div>
            <div class="rec-date">${(r.createdAt||'').slice(0,16).replace('T',' ')}</div>
          </div>
        </div>`).join('')}
    `;
  }

  async function submitManualRec() {
    if (!currentStoreId) return;
    const title = document.getElementById('rec-title').value;
    const artist = document.getElementById('rec-artist').value;
    const vid = document.getElementById('rec-vid').value;
    const playTime = document.getElementById('rec-playtime').value;
    const refereeName = document.getElementById('rec-referee').value;
    if (!title || !artist) { alert('곡 제목과 아티스트는 필수입니다'); return; }

    const r = await api('POST', `/api/stores/${currentStoreId}/songs/recommendations`, {
      title, artist, vid, refereeName,
      playTime: playTime ? parseInt(playTime) : null
    });
    if (r) { alert('추천 등록 완료 (결제 없이 등록됨)'); renderRecTab(); }
  }

  // ── Playlist Page ──
  async function loadPlaylistStores() {
    const data = await api('GET', '/api/admin/stores?size=100');
    if (!data) return;
    const list = document.getElementById('pl-store-list');
    list.innerHTML = (data.stores || []).map(s => `
      <div class="pl-store-item" onclick="selectPlaylistStore(${s.storeId}, this, ${JSON.stringify(esc(s.name))})" id="pls-${s.storeId}">
        <div class="pl-store-thumb">🏪</div>
        <div>
          <div class="pl-store-name">${esc(s.name)}</div>
          <div class="pl-store-addr">ID: ${s.storeId}</div>
        </div>
        <div class="no-pl-badge">업음</div>
      </div>`).join('');

    setupDrop();
  }

  async function selectPlaylistStore(storeId, el, name) {
    document.querySelectorAll('.pl-store-item').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');

    const right = document.getElementById('pl-right');
    right.innerHTML = `
      <div class="pl-right-header">
        <div class="pl-store-thumb">🏪</div>
        <div><div class="pl-right-name">${name}</div><div class="pl-right-sub">플레이리스트 로딩 중...</div></div>
      </div>
      <div class="pl-empty"><div class="loading">로딩 중...</div></div>
    `;

    const data = await api('GET', `/api/admin/stores/${storeId}`);
    const storeInfo = data?.storeInfo || {};

    const playlistData = await fetch(`${API}/api/stores/${storeId}/playlist`).then(r => r.ok ? r.json() : null).catch(()=>null);
    const songs = playlistData?.playlist?.songs || [];

    right.innerHTML = `
      <div class="pl-right-header">
        <div class="pl-store-thumb">🏪</div>
        <div>
          <div class="pl-right-name">${name}</div>
          <div class="pl-right-sub">${storeInfo.address || ''}</div>
        </div>
        <div style="margin-left:auto;font-size:12px;color:#475569">${songs.length}곡</div>
      </div>
      ${songs.length ? `
        <div class="pl-songs">
          ${songs.map((s,i) => `
            <div class="pl-song-row">
              <div class="pl-song-num">${i+1}</div>
              <div class="pl-song-info">
                <div class="pl-song-title">${esc(s.title||'-')}</div>
                <div class="pl-song-artist">${esc(s.artist||'-')}</div>
              </div>
              <div style="text-align:right">
                ${s.playTime ? `<div class="pl-song-time">${Math.floor(s.playTime/60)}:${String(s.playTime%60).padStart(2,'0')}</div>` : ''}
                ${s.vid ? `<a class="pl-song-vid" href="https://youtu.be/${esc(s.vid)}" target="_blank">▶ ${esc(s.vid)}</a>` : ''}
              </div>
            </div>`).join('')}
        </div>
      ` : `
        <div class="pl-empty">
          <div class="pl-empty-icon">📋</div>
          <div class="pl-empty-text">플레이리스트가 없습니다</div>
          <div style="font-size:11px;color:#334155;margin-top:4px">엑셀을 업로드하고 플레이리스트를 생성해 주세요</div>
        </div>
      `}
    `;
  }

  function setupDrop() {
    const zone = document.getElementById('pl-drop-zone');
    if (!zone) return;
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor = '#334155'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor = ''; });
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.style.borderColor = '';
      const file = e.dataTransfer.files[0];
      if (file) processExcel(file);
    });
  }

  function handleExcelUpload(input) {
    if (input.files[0]) processExcel(input.files[0]);
  }

  function processExcel(file) {
    alert(`파일 "${file.name}" 선택됨\n실제 업로드는 백엔드 API와 연동 후 사용 가능합니다.`);
  }

  // ── Utils ──
  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Start ──
  window.addEventListener('DOMContentLoaded', () => {
    if (token) {
      document.getElementById('login-screen').style.display = 'none';
      init();
    }
    document.getElementById('l-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  });
</script>
</body>
</html>
