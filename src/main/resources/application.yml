spring:
  profiles:
    active: local

# 미디어(오디오) 전송용 CloudFront 도메인 — 비밀값 아님. 전 프로파일 공통.
cloud:
  aws:
    cloudfront:
      domain: d144jf8wjk9lk.cloudfront.net

---

spring:
  config:
    activate:
      on-profile: local
    import:
      - classpath:server-secrets/application-local.yml

---

spring:
  config:
    activate:
      on-profile: dev
    import:
      - classpath:server-secrets/application-dev.yml

---

spring:
  config:
    activate:
      on-profile: prod1
    import:
      - classpath:server-secrets/application-prod-default.yml
      - classpath:server-secrets/application-prod1.yml

---

spring:
  config:
    activate:
      on-profile: prod2
    import:
      - classpath:server-secrets/application-prod-default.yml
      - classpath:server-secrets/application-prod2.yml
