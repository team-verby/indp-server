name: CD

on:
  push:
    branches: [ "dev" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.ACTIONS_TOKEN }}
          submodules: true

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build

      - name: Upload jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*.jar"
          target: /home/ubuntu/app/deploy/
          strip_components: 2

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          script: |
            DEPLOY_PATH=/home/ubuntu/app/deploy
            APP_LOG=$DEPLOY_PATH/application.log
            ERROR_LOG=$DEPLOY_PATH/deploy-error.log

            # 기존 프로세스 종료
            CURRENT_PID=$(lsof -ti tcp:8080)
            if [ -n "$CURRENT_PID" ]; then
              kill -15 $CURRENT_PID
              sleep 5
            fi

            # 최신 jar 실행
            JAR_NAME=$(ls -tr $DEPLOY_PATH | grep jar | tail -n 1)
            nohup java -jar $DEPLOY_PATH/$JAR_NAME --spring.profiles.active=dev >> $APP_LOG 2>> $ERROR_LOG &
            echo "배포 완료: $JAR_NAME"
